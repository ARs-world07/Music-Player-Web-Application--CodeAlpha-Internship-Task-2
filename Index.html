<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Player</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="light-mode">
    <div class="music-player-layout flex flex-col lg:flex-row gap-6 p-4 md:p-8 w-full max-w-7xl mx-auto">

        <!-- Music Player Section -->
        <div class="player-container flex-1 bg-white rounded-xl p-6 md:p-8 shadow-lg flex flex-col items-center justify-between min-h-[400px] lg:min-h-[600px]">
            <h1 class="text-3xl font-bold mb-6 text-indigo-700 dark:text-indigo-400">Music Player</h1>

            <!-- Album Art / Placeholder -->
            <div class="w-48 h-48 md:w-64 md:h-64 bg-gray-200 dark:bg-gray-700 rounded-lg flex items-center justify-center overflow-hidden mb-6 shadow-md">
                <i class="fas fa-music text-6xl text-gray-500 dark:text-gray-400"></i>
                <!-- <img id="album-art" src="https://placehold.co/256x256/a78bfa/ffffff?text=No+Album+Art" alt="Album Art" class="w-full h-full object-cover"> -->
            </div>

            <!-- Track Info -->
            <div class="text-center mb-6 w-full">
                <p id="track-name" class="text-xl md:text-2xl font-semibold mb-1 truncate">No song selected</p>
                <p id="track-artist" class="text-md md:text-lg text-gray-600 dark:text-gray-300 truncate">Unknown Artist</p>
            </div>

            <!-- Progress Bar -->
            <div class="w-full mb-6">
                <input type="range" id="progress-bar" value="0" min="0" max="100" class="w-full h-2 bg-gray-300 dark:bg-gray-600 rounded-full appearance-none cursor-pointer">
                <div class="flex justify-between text-sm mt-1 text-gray-500 dark:text-gray-400">
                    <span id="current-time">0:00</span>
                    <span id="duration">0:00</span>
                </div>
            </div>

            <!-- Playback Controls -->
            <div class="controls-row flex items-center justify-center gap-4 md:gap-6 mb-6">
                <button id="prev-button" class="control-button p-3 rounded-full bg-gray-100 dark:bg-gray-800 hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors duration-200 transform hover:scale-105">
                    <i class="fas fa-backward text-xl"></i>
                </button>
                <button id="play-pause-button" class="control-button p-4 rounded-full bg-indigo-500 text-white shadow-lg hover:bg-indigo-600 transition-colors duration-200 transform hover:scale-110">
                    <i id="play-pause-icon" class="fas fa-play text-2xl"></i>
                </button>
                <button id="next-button" class="control-button p-3 rounded-full bg-gray-100 dark:bg-gray-800 hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors duration-200 transform hover:scale-105">
                    <i class="fas fa-forward text-xl"></i>
                </button>
            </div>

            <!-- Volume Control -->
            <div class="volume-control flex items-center w-full max-w-xs mb-6">
                <i class="fas fa-volume-down text-gray-600 dark:text-gray-300 mr-2"></i>
                <input type="range" id="volume-bar" value="100" min="0" max="100" class="w-full h-2 bg-gray-300 dark:bg-gray-600 rounded-full appearance-none cursor-pointer">
                <i class="fas fa-volume-up text-gray-600 dark:text-gray-300 ml-2"></i>
            </div>

            <!-- Hidden Audio Element -->
            <audio id="audio-player" class="hidden"></audio>

            <!-- File Upload and Theme Toggle -->
            <div class="flex flex-col md:flex-row items-center justify-center gap-4 w-full">
                <label for="file-upload" class="cursor-pointer bg-blue-500 hover:bg-blue-600 text-white font-semibold py-2 px-4 rounded-lg transition duration-200 shadow-md flex items-center justify-center">
                    <i class="fas fa-upload mr-2"></i> Upload Music
                </label>
                <input type="file" id="file-upload" accept=".mp3,.wav" multiple class="hidden">

                <button id="theme-toggle" class="bg-gray-200 dark:bg-gray-700 hover:bg-gray-300 dark:hover:bg-gray-600 text-gray-800 dark:text-gray-200 font-semibold py-2 px-4 rounded-lg transition duration-200 shadow-md flex items-center justify-center">
                    <i class="fas fa-moon mr-2" id="theme-icon"></i> Toggle Theme
                </button>
            </div>
        </div>

        <!-- Playlist and Search Section -->
        <div class="playlist-section flex-1 bg-white rounded-xl p-6 md:p-8 shadow-lg flex flex-col min-h-[400px] lg:min-h-[600px]">
            <h2 class="text-2xl font-bold mb-4 text-indigo-700 dark:text-indigo-400">My Playlists</h2>

            <!-- Search Bar -->
            <div class="mb-4">
                <input type="text" id="search-input" placeholder="Search songs or artists..." class="w-full p-3 rounded-lg border border-gray-300 dark:border-gray-600 focus:outline-none focus:ring-2 focus:ring-indigo-500 dark:focus:ring-indigo-400 transition duration-200">
            </div>

            <!-- Playlist Actions -->
            <div class="flex gap-2 mb-4">
                <button id="create-playlist-button" class="bg-green-500 hover:bg-green-600 text-white font-semibold py-2 px-3 rounded-lg transition duration-200 text-sm flex-1">
                    <i class="fas fa-plus mr-1"></i> New Playlist
                </button>
                <button id="load-playlist-button" class="bg-yellow-500 hover:bg-yellow-600 text-white font-semibold py-2 px-3 rounded-lg transition duration-200 text-sm flex-1">
                    <i class="fas fa-folder-open mr-1"></i> Load Playlist
                </button>
                <button id="save-playlist-button" class="bg-purple-500 hover:bg-purple-600 text-white font-semibold py-2 px-3 rounded-lg transition duration-200 text-sm flex-1">
                    <i class="fas fa-save mr-1"></i> Save Playlist
                </button>
            </div>

            <!-- Current Playlist Display -->
            <div class="flex-1 overflow-y-auto pr-2 custom-scrollbar">
                <ul id="playlist-display" class="space-y-2">
                    <!-- Playlist items will be injected here by JavaScript -->
                    <li class="p-3 bg-gray-100 dark:bg-gray-800 rounded-lg text-gray-600 dark:text-gray-300 text-center">
                        Upload songs or load a playlist to get started!
                    </li>
                </ul>
            </div>
        </div>
    </div>

    <!-- Modals -->
    <!-- Create/Load/Save Playlist Modal -->
    <div id="playlist-modal" class="modal">
        <div class="modal-content bg-white dark:bg-gray-800 shadow-xl rounded-lg p-6">
            <div class="modal-header flex justify-between items-center pb-3 mb-4 border-b border-gray-200 dark:border-gray-700">
                <h3 id="modal-title" class="text-xl font-semibold text-indigo-700 dark:text-indigo-400">Playlist Actions</h3>
                <span class="close-button text-gray-500 hover:text-gray-800 dark:hover:text-gray-300 cursor-pointer text-2xl" onclick="closeModal('playlist-modal')">&times;</span>
            </div>
            <div class="modal-body mb-4">
                <div id="create-playlist-section" class="hidden">
                    <label for="new-playlist-name" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">New Playlist Name:</label>
                    <input type="text" id="new-playlist-name" class="w-full p-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 dark:focus:ring-indigo-400 mb-4" placeholder="e.g., My Favorites">
                    <button id="confirm-create-playlist" class="w-full bg-indigo-500 hover:bg-indigo-600 text-white font-semibold py-2 px-4 rounded-lg transition duration-200">
                        Create Playlist
                    </button>
                </div>

                <div id="load-playlist-section" class="hidden">
                    <label for="select-playlist-to-load" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Select Playlist:</label>
                    <select id="select-playlist-to-load" class="w-full p-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 dark:focus:ring-indigo-400 mb-4">
                        <!-- Options will be populated by JS -->
                    </select>
                    <button id="confirm-load-playlist" class="w-full bg-indigo-500 hover:bg-indigo-600 text-white font-semibold py-2 px-4 rounded-lg transition duration-200">
                        Load Selected Playlist
                    </button>
                    <button id="delete-selected-playlist" class="w-full mt-2 bg-red-500 hover:bg-red-600 text-white font-semibold py-2 px-4 rounded-lg transition duration-200">
                        Delete Selected Playlist
                    </button>
                </div>

                <div id="save-playlist-section" class="hidden">
                    <p class="text-gray-700 dark:text-gray-300 mb-4">Current playlist will be saved. You can load it later.</p>
                    <button id="confirm-save-playlist" class="w-full bg-indigo-500 hover:bg-indigo-600 text-white font-semibold py-2 px-4 rounded-lg transition duration-200">
                        Save Current Playlist
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Message Box Modal -->
    <div id="message-box-modal" class="modal">
        <div class="modal-content bg-white dark:bg-gray-800 shadow-xl rounded-lg p-6 text-center">
            <div class="modal-header flex justify-between items-center pb-3 mb-4 border-b border-gray-200 dark:border-gray-700">
                <h3 id="message-box-title" class="text-xl font-semibold text-indigo-700 dark:text-indigo-400">Message</h3>
                <span class="close-button text-gray-500 hover:text-gray-800 dark:hover:text-gray-300 cursor-pointer text-2xl" onclick="closeModal('message-box-modal')">&times;</span>
            </div>
            <div class="modal-body mb-4">
                <p id="message-box-text" class="text-gray-700 dark:text-gray-300"></p>
            </div>
            <div class="modal-footer pt-3 border-t border-gray-200 dark:border-gray-700">
                <button onclick="closeModal('message-box-modal')" class="bg-indigo-500 hover:bg-indigo-600 text-white font-semibold py-2 px-4 rounded-lg transition duration-200">
                    OK
                </button>
            </div>
        </div>
    </div>


    <script>
        // Get DOM elements
        const audioPlayer = document.getElementById('audio-player');
        const playPauseButton = document.getElementById('play-pause-button');
        const playPauseIcon = document.getElementById('play-pause-icon');
        const prevButton = document.getElementById('prev-button');
        const nextButton = document.getElementById('next-button');
        const progressBar = document.getElementById('progress-bar');
        const volumeBar = document.getElementById('volume-bar');
        const currentTimeSpan = document.getElementById('current-time');
        const durationSpan = document.getElementById('duration');
        const trackNameSpan = document.getElementById('track-name');
        const trackArtistSpan = document.getElementById('track-artist');
        const fileUploadInput = document.getElementById('file-upload');
        const playlistDisplay = document.getElementById('playlist-display');
        const searchInput = document.getElementById('search-input');
        const themeToggle = document.getElementById('theme-toggle');
        const themeIcon = document.getElementById('theme-icon');
        const body = document.body;

        // Playlist Modals
        const playlistModal = document.getElementById('playlist-modal');
        const modalTitle = document.getElementById('modal-title');
        const createPlaylistSection = document.getElementById('create-playlist-section');
        const newPlaylistNameInput = document.getElementById('new-playlist-name');
        const confirmCreatePlaylistButton = document.getElementById('confirm-create-playlist');
        const loadPlaylistSection = document.getElementById('load-playlist-section');
        const selectPlaylistToLoad = document.getElementById('select-playlist-to-load');
        const confirmLoadPlaylistButton = document.getElementById('confirm-load-playlist');
        const deleteSelectedPlaylistButton = document.getElementById('delete-selected-playlist');
        const savePlaylistSection = document.getElementById('save-playlist-section');
        const confirmSavePlaylistButton = document.getElementById('confirm-save-playlist');

        const createPlaylistButton = document.getElementById('create-playlist-button');
        const loadPlaylistButton = document.getElementById('load-playlist-button');
        const savePlaylistButton = document.getElementById('save-playlist-button');

        // Message Box Modal
        const messageBoxModal = document.getElementById('message-box-modal');
        const messageBoxTitle = document.getElementById('message-box-title');
        const messageBoxText = document.getElementById('message-box-text');

        // Global state variables
        let currentPlaylist = [];
        let currentTrackIndex = -1;
        let isPlaying = false;
        let allPlaylists = {}; // Stores all playlists saved by the user { playlistName: [song1, song2] }

        // --- Utility Functions ---

        /**
         * Formats time from seconds to MM:SS string.
         * @param {number} seconds - The time in seconds.
         * @returns {string} Formatted time string.
         */
        function formatTime(seconds) {
            const minutes = Math.floor(seconds / 60);
            const remainingSeconds = Math.floor(seconds % 60);
            const formattedSeconds = remainingSeconds < 10 ? '0' + remainingSeconds : remainingSeconds;
            return `${minutes}:${formattedSeconds}`;
        }

        /**
         * Displays a custom message box modal.
         * @param {string} title - The title of the message box.
         * @param {string} message - The message to display.
         */
        function showMessageBox(title, message) {
            messageBoxTitle.textContent = title;
            messageBoxText.textContent = message;
            messageBoxModal.style.display = 'flex'; // Use flex to center
        }

        /**
         * Closes a specified modal.
         * @param {string} modalId - The ID of the modal to close.
         */
        function closeModal(modalId) {
            document.getElementById(modalId).style.display = 'none';
        }

        // --- Audio Player Functions ---

        /**
         * Loads a track into the audio player.
         * @param {object} track - The track object {name, artist, src}.
         */
        function loadTrack(track) {
            if (!track) {
                audioPlayer.src = '';
                trackNameSpan.textContent = 'No song selected';
                trackArtistSpan.textContent = 'Unknown Artist';
                durationSpan.textContent = '0:00';
                progressBar.value = 0;
                playPauseIcon.classList.remove('fa-pause');
                playPauseIcon.classList.add('fa-play');
                isPlaying = false;
                return;
            }
            audioPlayer.src = track.src;
            trackNameSpan.textContent = track.name;
            trackArtistSpan.textContent = track.artist;
            // Reset progress bar and time display
            currentTimeSpan.textContent = '0:00';
            durationSpan.textContent = '0:00';
            progressBar.value = 0;
        }

        /**
         * Plays the current track.
         */
        function playTrack() {
            if (currentPlaylist.length === 0 || currentTrackIndex === -1) {
                showMessageBox('No Song', 'Please upload or select a song to play.');
                return;
            }
            audioPlayer.play();
            playPauseIcon.classList.remove('fa-play');
            playPauseIcon.classList.add('fa-pause');
            isPlaying = true;
        }

        /**
         * Pauses the current track.
         */
        function pauseTrack() {
            audioPlayer.pause();
            playPauseIcon.classList.remove('fa-pause');
            playPauseIcon.classList.add('fa-play');
            isPlaying = false;
        }

        /**
         * Toggles play/pause state.
         */
        function togglePlayPause() {
            if (isPlaying) {
                pauseTrack();
            } else {
                playTrack();
            }
        }

        /**
         * Plays the next track in the playlist.
         */
        function playNextTrack() {
            if (currentPlaylist.length === 0) return;
            currentTrackIndex = (currentTrackIndex + 1) % currentPlaylist.length;
            loadTrack(currentPlaylist[currentTrackIndex]);
            playTrack();
            renderPlaylist(); // Update active class
        }

        /**
         * Plays the previous track in the playlist.
         */
        function playPrevTrack() {
            if (currentPlaylist.length === 0) return;
            currentTrackIndex = (currentTrackIndex - 1 + currentPlaylist.length) % currentPlaylist.length;
            loadTrack(currentPlaylist[currentTrackIndex]);
            playTrack();
            renderPlaylist(); // Update active class
        }

        // --- Event Listeners for Audio Player ---

        playPauseButton.addEventListener('click', togglePlayPause);
        prevButton.addEventListener('click', playPrevTrack);
        nextButton.addEventListener('click', playNextTrack);

        audioPlayer.addEventListener('timeupdate', () => {
            const progress = (audioPlayer.currentTime / audioPlayer.duration) * 100;
            progressBar.value = isNaN(progress) ? 0 : progress; // Handle NaN for initial load
            currentTimeSpan.textContent = formatTime(audioPlayer.currentTime);
        });

        audioPlayer.addEventListener('loadedmetadata', () => {
            durationSpan.textContent = formatTime(audioPlayer.duration);
        });

        audioPlayer.addEventListener('ended', () => {
            playNextTrack(); // Automatically play next song
        });

        progressBar.addEventListener('input', () => {
            const seekTime = (progressBar.value / 100) * audioPlayer.duration;
            audioPlayer.currentTime = seekTime;
        });

        volumeBar.addEventListener('input', () => {
            audioPlayer.volume = volumeBar.value / 100;
        });

        // --- File Upload ---

        fileUploadInput.addEventListener('change', (event) => {
            const files = event.target.files;
            if (files.length > 0) {
                // Clear existing playlist if new files are uploaded
                currentPlaylist = [];
                for (let i = 0; i < files.length; i++) {
                    const file = files[i];
                    if (file.type.startsWith('audio/')) {
                        const track = {
                            id: Date.now() + Math.random().toString(36).substring(2, 9), // Unique ID
                            name: file.name.split('.').slice(0, -1).join('.'), // Remove extension
                            artist: 'Local Upload', // Default artist
                            src: URL.createObjectURL(file),
                            file: file // Keep reference to the file object if needed later
                        };
                        currentPlaylist.push(track);
                    } else {
                        showMessageBox('Unsupported File', `File "${file.name}" is not an audio file and will be skipped.`);
                    }
                }
                if (currentPlaylist.length > 0) {
                    currentTrackIndex = 0;
                    loadTrack(currentPlaylist[currentTrackIndex]);
                    renderPlaylist();
                    playTrack();
                } else {
                    showMessageBox('No Audio Files', 'No valid audio files were uploaded.');
                    loadTrack(null); // Clear player
                }
            }
        });

        // --- Playlist Management Functions ---

        /**
         * Renders the current playlist in the UI.
         * Applies active class to the currently playing track.
         */
        function renderPlaylist() {
            playlistDisplay.innerHTML = ''; // Clear existing list
            if (currentPlaylist.length === 0) {
                playlistDisplay.innerHTML = `
                    <li class="p-3 bg-gray-100 dark:bg-gray-800 rounded-lg text-gray-600 dark:text-gray-300 text-center">
                        Upload songs or load a playlist to get started!
                    </li>
                `;
                return;
            }

            currentPlaylist.forEach((track, index) => {
                const listItem = document.createElement('li');
                listItem.classList.add('playlist-item', 'p-3', 'rounded-lg', 'flex', 'items-center', 'justify-between', 'cursor-pointer', 'transition-colors', 'duration-200');
                listItem.classList.add('bg-gray-100', 'dark:bg-gray-800', 'hover:bg-gray-200', 'dark:hover:bg-gray-700');

                if (index === currentTrackIndex) {
                    listItem.classList.add('active'); // Apply active class
                }

                listItem.innerHTML = `
                    <div class="flex-1 min-w-0 pr-2">
                        <p class="font-medium text-gray-800 dark:text-gray-100 truncate">${track.name}</p>
                        <p class="text-sm text-gray-500 dark:text-gray-400 truncate">${track.artist}</p>
                    </div>
                    <button class="remove-from-playlist-button text-red-500 hover:text-red-700 p-2 rounded-full transition-colors duration-200" data-id="${track.id}">
                        <i class="fas fa-times"></i>
                    </button>
                `;
                listItem.addEventListener('click', (event) => {
                    // Prevent playing when clicking the remove button
                    if (!event.target.closest('.remove-from-playlist-button')) {
                        currentTrackIndex = index;
                        loadTrack(currentPlaylist[currentTrackIndex]);
                        playTrack();
                        renderPlaylist(); // Re-render to update active class
                    }
                });
                playlistDisplay.appendChild(listItem);
            });

            // Add event listeners for remove buttons
            document.querySelectorAll('.remove-from-playlist-button').forEach(button => {
                button.addEventListener('click', (event) => {
                    event.stopPropagation(); // Prevent the parent li's click event
                    const trackIdToRemove = button.dataset.id;
                    removeTrackFromCurrentPlaylist(trackIdToRemove);
                });
            });
        }

        /**
         * Removes a track from the current playlist by its ID.
         * @param {string} trackId - The ID of the track to remove.
         */
        function removeTrackFromCurrentPlaylist(trackId) {
            const initialLength = currentPlaylist.length;
            currentPlaylist = currentPlaylist.filter(track => track.id !== trackId);

            if (currentPlaylist.length < initialLength) { // If a track was actually removed
                if (currentTrackIndex !== -1 && currentPlaylist.length > 0) {
                    // Adjust currentTrackIndex if the removed track was before the current one
                    if (currentTrackIndex >= currentPlaylist.length) {
                        currentTrackIndex = currentPlaylist.length - 1; // If last track removed, go to new last
                    }
                    if (currentTrackIndex < 0) currentTrackIndex = 0; // Ensure index is not negative
                    loadTrack(currentPlaylist[currentTrackIndex]);
                    if (isPlaying) {
                        playTrack();
                    }
                } else {
                    // If playlist is empty after removal or no track was playing
                    currentTrackIndex = -1;
                    loadTrack(null);
                    pauseTrack();
                }
                renderPlaylist(); // Re-render the playlist
                showMessageBox('Track Removed', 'Song removed from the current playlist.');
            }
        }


        /**
         * Saves the current playlist to localStorage.
         * Uses a modal to ask for playlist name if not saving to an existing one.
         */
        function saveCurrentPlaylist(playlistName) {
            if (currentPlaylist.length === 0) {
                showMessageBox('No Songs', 'Cannot save an empty playlist.');
                return;
            }

            if (!playlistName) {
                showMessageBox('Error', 'Playlist name cannot be empty.');
                return;
            }

            // Store only necessary data to avoid issues with File objects
            const savablePlaylist = currentPlaylist.map(track => ({
                id: track.id,
                name: track.name,
                artist: track.artist,
                src: track.src // Note: For local files, this will be an object URL and won't persist across sessions
            }));

            allPlaylists[playlistName] = savablePlaylist;
            localStorage.setItem('allPlaylists', JSON.stringify(allPlaylists));
            showMessageBox('Playlist Saved', `Playlist "${playlistName}" saved successfully!`);
            closeModal('playlist-modal');
        }

        /**
         * Loads a selected playlist from localStorage.
         * @param {string} playlistName - The name of the playlist to load.
         */
        function loadSelectedPlaylist(playlistName) {
            if (allPlaylists[playlistName]) {
                // For security and persistence, object URLs from file uploads cannot be reloaded.
                // We'll load the playlist structure, but tracks from local files will need re-uploading.
                // For demonstration, we'll just load the info.
                currentPlaylist = allPlaylists[playlistName].filter(track => !track.src.startsWith('blob:')); // Filter out blob URLs for now
                if (currentPlaylist.length === 0) {
                    showMessageBox('Playlist Loaded (Partial)', `Playlist "${playlistName}" loaded. Note: Locally uploaded files cannot be reloaded from saved playlists. Please re-upload them.`);
                } else {
                    showMessageBox('Playlist Loaded', `Playlist "${playlistName}" loaded successfully!`);
                }

                currentTrackIndex = currentPlaylist.length > 0 ? 0 : -1;
                loadTrack(currentPlaylist[currentTrackIndex]);
                renderPlaylist();
                pauseTrack(); // Pause after loading a new playlist
            } else {
                showMessageBox('Error', `Playlist "${playlistName}" not found.`);
            }
            closeModal('playlist-modal');
        }

        /**
         * Deletes a selected playlist from localStorage.
         * @param {string} playlistName - The name of the playlist to delete.
         */
        function deleteSelectedPlaylist(playlistName) {
            if (confirm(`Are you sure you want to delete playlist "${playlistName}"?`)) {
                delete allPlaylists[playlistName];
                localStorage.setItem('allPlaylists', JSON.stringify(allPlaylists));
                showMessageBox('Playlist Deleted', `Playlist "${playlistName}" deleted.`);
                populatePlaylistSelect(); // Refresh the select options
                // If the deleted playlist was the current one, clear the player
                if (JSON.stringify(currentPlaylist.map(t => t.id)) === JSON.stringify(allPlaylists[playlistName]?.map(t => t.id))) {
                    currentPlaylist = [];
                    currentTrackIndex = -1;
                    loadTrack(null);
                    renderPlaylist();
                }
            }
        }

        /**
         * Populates the select dropdown with saved playlists.
         */
        function populatePlaylistSelect() {
            selectPlaylistToLoad.innerHTML = '<option value="">-- Select a Playlist --</option>';
            const playlistNames = Object.keys(allPlaylists);
            if (playlistNames.length === 0) {
                selectPlaylistToLoad.innerHTML += '<option value="" disabled>No saved playlists</option>';
            } else {
                playlistNames.forEach(name => {
                    const option = document.createElement('option');
                    option.value = name;
                    option.textContent = name;
                    selectPlaylistToLoad.appendChild(option);
                });
            }
        }

        // --- Modal Event Listeners ---

        createPlaylistButton.addEventListener('click', () => {
            modalTitle.textContent = 'Create New Playlist';
            createPlaylistSection.classList.remove('hidden');
            loadPlaylistSection.classList.add('hidden');
            savePlaylistSection.classList.add('hidden');
            newPlaylistNameInput.value = ''; // Clear input
            playlistModal.style.display = 'flex';
        });

        loadPlaylistButton.addEventListener('click', () => {
            modalTitle.textContent = 'Load Existing Playlist';
            createPlaylistSection.classList.add('hidden');
            loadPlaylistSection.classList.remove('hidden');
            savePlaylistSection.classList.add('hidden');
            populatePlaylistSelect();
            playlistModal.style.display = 'flex';
        });

        savePlaylistButton.addEventListener('click', () => {
            if (currentPlaylist.length === 0) {
                showMessageBox('No Songs', 'Cannot save an empty playlist.');
                return;
            }
            modalTitle.textContent = 'Save Current Playlist';
            createPlaylistSection.classList.add('hidden');
            loadPlaylistSection.classList.add('hidden');
            savePlaylistSection.classList.remove('hidden');
            playlistModal.style.display = 'flex';
        });

        confirmCreatePlaylistButton.addEventListener('click', () => {
            const newName = newPlaylistNameInput.value.trim();
            if (newName) {
                if (allPlaylists[newName]) {
                    showMessageBox('Error', `Playlist "${newName}" already exists. Please choose a different name.`);
                } else {
                    // When creating a new playlist, it starts empty.
                    // The user then adds songs to the *current* playlist, then saves it.
                    // This button just registers the name for future saving.
                    // For simplicity, we'll make 'create' actually save the *current* playlist under a new name.
                    // Or, if the user wants to create an *empty* new playlist, we clear currentPlaylist.
                    // Let's make it save the current playlist under the new name.
                    saveCurrentPlaylist(newName);
                    populatePlaylistSelect(); // Update load options
                }
            } else {
                showMessageBox('Error', 'Playlist name cannot be empty.');
            }
        });

        confirmLoadPlaylistButton.addEventListener('click', () => {
            const selectedName = selectPlaylistToLoad.value;
            if (selectedName) {
                loadSelectedPlaylist(selectedName);
            } else {
                showMessageBox('Error', 'Please select a playlist to load.');
            }
        });

        deleteSelectedPlaylistButton.addEventListener('click', () => {
            const selectedName = selectPlaylistToLoad.value;
            if (selectedName) {
                deleteSelectedPlaylist(selectedName);
            } else {
                showMessageBox('Error', 'Please select a playlist to delete.');
            }
        });

        confirmSavePlaylistButton.addEventListener('click', () => {
            // If the user clicks "Save Current Playlist" directly, ask for a name
            // or overwrite an existing one. For simplicity, let's ask for a name.
            const playlistName = prompt("Enter a name for the current playlist:");
            if (playlistName) {
                saveCurrentPlaylist(playlistName.trim());
                populatePlaylistSelect(); // Update load options
            } else if (playlistName === null) {
                // User cancelled prompt
                showMessageBox('Cancelled', 'Playlist save cancelled.');
            } else {
                showMessageBox('Error', 'Playlist name cannot be empty.');
            }
        });


        // --- Search Functionality ---

        searchInput.addEventListener('input', () => {
            const searchTerm = searchInput.value.toLowerCase();
            const playlistItems = playlistDisplay.querySelectorAll('.playlist-item');

            playlistItems.forEach(item => {
                const trackName = item.querySelector('p:first-child').textContent.toLowerCase();
                const artistName = item.querySelector('p:last-child').textContent.toLowerCase();

                if (trackName.includes(searchTerm) || artistName.includes(searchTerm)) {
                    item.style.display = 'flex'; // Show matching items
                } else {
                    item.style.display = 'none'; // Hide non-matching items
                }
            });
        });

        // --- Theme Toggle ---

        themeToggle.addEventListener('click', () => {
            body.classList.toggle('dark-mode');
            body.classList.toggle('light-mode');

            // Update icon and text
            if (body.classList.contains('dark-mode')) {
                themeIcon.classList.remove('fa-moon');
                themeIcon.classList.add('fa-sun');
                themeToggle.innerHTML = '<i class="fas fa-sun mr-2" id="theme-icon"></i> Toggle Light';
                localStorage.setItem('theme', 'dark');
            } else {
                themeIcon.classList.remove('fa-sun');
                themeIcon.classList.add('fa-moon');
                themeToggle.innerHTML = '<i class="fas fa-moon mr-2" id="theme-icon"></i> Toggle Dark';
                localStorage.setItem('theme', 'light');
            }
        });

        // --- Initialization ---

        /**
         * Initializes the application state and UI on page load.
         */
        function initializeApp() {
            // Load theme preference
            const savedTheme = localStorage.getItem('theme') || 'light';
            if (savedTheme === 'dark') {
                body.classList.remove('light-mode');
                body.classList.add('dark-mode');
                themeIcon.classList.remove('fa-moon');
                themeIcon.classList.add('fa-sun');
                themeToggle.innerHTML = '<i class="fas fa-sun mr-2" id="theme-icon"></i> Toggle Light';
            } else {
                body.classList.remove('dark-mode');
                body.classList.add('light-mode');
                themeIcon.classList.remove('fa-sun');
                themeIcon.classList.add('fa-moon');
                themeToggle.innerHTML = '<i class="fas fa-moon mr-2" id="theme-icon"></i> Toggle Dark';
            }

            // Load all playlists from localStorage
            const storedPlaylists = localStorage.getItem('allPlaylists');
            if (storedPlaylists) {
                try {
                    allPlaylists = JSON.parse(storedPlaylists);
                } catch (e) {
                    console.error("Error parsing stored playlists:", e);
                    allPlaylists = {}; // Reset if corrupted
                }
            } else {
                allPlaylists = {};
            }

            // Set initial volume
            audioPlayer.volume = volumeBar.value / 100;

            // Render initial empty playlist or a loaded one if available
            renderPlaylist();
            loadTrack(null); // Initialize player with no track
        }

        // Run initialization when the DOM is fully loaded
        document.addEventListener('DOMContentLoaded', initializeApp);

        // Keyboard shortcuts (Bonus Idea)
        document.addEventListener('keydown', (event) => {
            if (event.code === 'Space') {
                event.preventDefault(); // Prevent scrolling
                togglePlayPause();
            } else if (event.code === 'ArrowRight') {
                playNextTrack();
            } else if (event.code === 'ArrowLeft') {
                playPrevTrack();
            }
        });

    </script>
</body>
</html>
